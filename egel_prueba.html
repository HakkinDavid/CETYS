<script>
const questions = [
{q:"Una institución financiera digital opera en un entorno donde múltiples usuarios realizan transferencias simultáneas entre cuentas, generando conflictos de concurrencia en los saldos. Además, el sistema debe mantener tiempos de respuesta bajos para no afectar la experiencia del usuario, y cualquier inconsistencia podría derivar en pérdidas económicas significativas. Considerando estas condiciones técnicas y operativas, ¿cuál es la solución más adecuada para garantizar integridad y rendimiento?", options:["Implementar bloqueo pesimista en toda la base de datos para evitar accesos concurrentes","Adoptar control de concurrencia multiversión (MVCC) para manejar lecturas y escrituras concurrentes","Eliminar la concurrencia limitando el sistema a operaciones secuenciales"], answer:1, area:"Aplicación"},
{q:"Una empresa de transporte analiza rutas en tiempo real dentro de una red de carreteras modelada como grafo ponderado con pesos positivos. El sistema requiere recalcular rutas óptimas constantemente ante cambios dinámicos en tráfico, manteniendo eficiencia computacional. Dado este escenario operativo y las restricciones del modelo, ¿qué algoritmo resulta más adecuado?", options:["Aplicar búsqueda en profundidad para explorar posibles rutas","Utilizar el algoritmo de Dijkstra con una estructura eficiente de cola de prioridad","Ordenar nodos mediante un algoritmo de ordenamiento tradicional"], answer:1, area:"Algoritmia"},
{q:"Una organización detecta accesos no autorizados dentro de su red interna. Se busca segmentar el tráfico para aislar dominios y reducir superficie de ataque sin modificar la infraestructura física existente. Además, se requiere una solución escalable y administrable. ¿Qué alternativa técnica es más adecuada?", options:["Implementar VLANs para segmentar la red lógicamente","Configurar servidores DNS adicionales","Utilizar protocolos ARP para control de tráfico"], answer:0, area:"Base"},
{q:"Una empresa desea predecir la demanda mensual de productos utilizando datos históricos que presentan tendencias y patrones estacionales. Se requiere un modelo que capture relaciones continuas entre variables y permita generalización adecuada. ¿Qué enfoque es más apropiado?", options:["Aplicar técnicas de regresión para modelar variables continuas","Utilizar clustering para agrupar datos sin etiquetas","Implementar recorridos en grafos para análisis"], answer:0, area:"IA"},
{q:"Un sistema de streaming maneja grandes volúmenes de contenido con alta frecuencia de acceso en lectura, mientras que las actualizaciones de datos son poco frecuentes. Se busca minimizar latencia y mejorar disponibilidad ante fallos. Considerando estas condiciones, ¿qué estrategia es más adecuada?", options:["Implementar cache distribuido para acelerar accesos frecuentes","Aplicar bloqueos exclusivos sobre los recursos","Normalizar completamente los datos"], answer:0, area:"Base"},
{q:"Una plataforma de comercio electrónico desea recomendar productos a sus usuarios basándose en patrones de comportamiento similares entre diferentes clientes. Se requiere un enfoque que utilice datos históricos de interacción para generar sugerencias personalizadas. ¿Qué técnica es más adecuada?", options:["Aplicar filtrado colaborativo basado en usuarios","Ordenar productos por popularidad global","Utilizar funciones hash"], answer:0, area:"IA"},
{q:"Una base de datos presenta redundancia significativa, lo que provoca inconsistencias durante actualizaciones y dificultades en mantenimiento. Se busca mejorar integridad sin sacrificar flexibilidad. ¿Qué acción es más adecuada?", options:["Normalizar el esquema de la base de datos","Replicar datos en múltiples nodos","Agregar capas de cache"], answer:0, area:"Aplicación"},
{q:"Un sistema requiere ordenar grandes volúmenes de datos en memoria limitada. Se busca minimizar consumo de espacio adicional sin sacrificar demasiado rendimiento. ¿Qué algoritmo es más adecuado bajo estas restricciones?", options:["Merge sort con memoria auxiliar","QuickSort in-place","Bubble sort"], answer:1, area:"Algoritmia"},
{q:"Un sistema distribuido necesita mantenerse disponible incluso ante fallos parciales de nodos, aceptando inconsistencias temporales que eventualmente se corrigen. ¿Qué modelo de consistencia refleja mejor este comportamiento?", options:["ACID estricto","Consistencia eventual","Serialización completa"], answer:1, area:"Base"},
{q:"Una aplicación web maneja credenciales de usuarios y requiere evitar exposición de contraseñas incluso ante filtraciones de base de datos. ¿Qué práctica es más adecuada?", options:["Aplicar hash con sal a las contraseñas","Guardar contraseñas en texto plano","Cachear credenciales"], answer:0, area:"Aplicación"},
{q:"Un laboratorio de investigación en biología computacional almacena grandes volúmenes de datos genómicos que requieren consultas agregadas eficientes, pero las actualizaciones son poco frecuentes. ¿Qué estrategia de almacenamiento puede mejorar el desempeño de las consultas?", options:["Utilizar vistas materializadas para acelerar consultas agregadas","Normalizar completamente todos los datos","Aplicar un esquema de replicación circular"], answer:0, area:"Aplicación"},
{q:"En una red empresarial, se requiere garantizar la entrega ordenada y confiable de paquetes entre servidores críticos que comparten información sensible. ¿Qué protocolo de transporte es más adecuado para este escenario?", options:["TCP por su control de flujo y retransmisión de paquetes","UDP por su baja latencia y simplicidad","ICMP para mensajes de error"], answer:0, area:"Base"},
{q:"Un sistema de análisis de sentimiento procesa comentarios de usuarios en redes sociales y necesita representar palabras en un espacio vectorial denso para capturar relaciones semánticas. ¿Qué técnica es la más adecuada?", options:["Utilizar embeddings como Word2Vec o GloVe para codificar palabras","Aplicar hashing simple a cada palabra","Clasificar palabras usando árboles de decisión"], answer:0, area:"IA"},
{q:"Una empresa de logística debe encontrar rutas óptimas en un grafo de carreteras donde pueden existir aristas con pesos negativos, pero sin ciclos negativos. ¿Qué algoritmo de caminos mínimos es más adecuado?", options:["Bellman-Ford para admitir pesos negativos","Dijkstra para eficiencia en pesos positivos","BFS para grafos no ponderados"], answer:0, area:"Algoritmia"},
{q:"Un sistema distribuido requiere asegurar tolerancia a fallos y disponibilidad, pero acepta que la consistencia puede ser eventual. ¿Qué principio arquitectónico describe mejor este compromiso?", options:["Modelo CAP priorizando disponibilidad y tolerancia a particiones","Modelo ACID estricto en todas las operaciones","Serialización total en cada transacción"], answer:0, area:"Base"},
{q:"Una plataforma de aprendizaje automático detecta que su modelo presenta un alto error en datos de entrenamiento y validación, indicando que no logra capturar la complejidad de los datos. ¿Qué medida es más efectiva para mejorar el desempeño?", options:["Aumentar la complejidad del modelo para reducir underfitting","Aplicar regularización para evitar overfitting","Reducir el tamaño del conjunto de entrenamiento"], answer:0, area:"IA"},
{q:"Un sistema de colas de mensajería requiere desacoplar el procesamiento de tareas entre productores y consumidores, permitiendo escalabilidad horizontal y tolerancia a fallos. ¿Qué componente es más adecuado para cumplir estos requisitos?", options:["Implementar una message queue persistente entre servicios","Utilizar llamadas RPC síncronas entre procesos","Almacenar tareas en archivos temporales"], answer:0, area:"Aplicación"},
{q:"Una red empresarial expone servicios internos a través de una única dirección pública, ocultando las direcciones privadas de los hosts individuales. ¿Qué mecanismo de red proporciona esta funcionalidad?", options:["Traducción de direcciones de red (NAT)","Segmentación mediante VLANs","Protocolo ARP para resolución de direcciones"], answer:0, area:"Base"},
{q:"En un sistema de recomendación de películas, se busca aumentar la diversidad de las sugerencias para evitar que los usuarios reciban siempre las mismas opciones populares. ¿Qué ajuste es más relevante?", options:["Incorporar técnicas de diversificación en el ranking de resultados","Aumentar únicamente la precisión del modelo sin modificar la diversidad","Eliminar los elementos menos populares de la base de datos"], answer:0, area:"IA"},
{q:"Un sistema de archivos requiere mantener la integridad de los datos ante posibles fallos de energía o sistema. ¿Qué técnica de almacenamiento ayuda a prevenir corrupción de datos en estas circunstancias?", options:["Implementar journaling para registrar operaciones antes de aplicarlas","Utilizar únicamente cache en memoria para acelerar accesos","Deshabilitar logs para maximizar el rendimiento"], answer:0, area:"Aplicación"},
{q:"Una empresa de análisis de datos necesita detectar patrones anómalos en registros históricos de transacciones, sin contar con etiquetas previas que indiquen qué es normal o anómalo. ¿Qué técnica de aprendizaje automático es la más indicada?", options:["Aplicar clustering no supervisado para identificar grupos atípicos","Usar clasificación supervisada con etiquetas generadas manualmente","Ordenar registros por fecha para buscar irregularidades"], answer:0, area:"IA"},
{q:"Un sistema concurrente experimenta problemas de deadlocks frecuentes al acceder a recursos compartidos. ¿Qué estrategia de diseño puede reducir la probabilidad de que ocurran estos bloqueos?", options:["Establecer un orden global de adquisición de recursos","Incrementar el número de hilos en ejecución","Agregar más memoria al sistema"], answer:0, area:"Base"},
{q:"En una base de datos relacional, se requiere garantizar que cada registro en una tabla secundaria tenga una correspondencia válida en la tabla primaria, evitando registros huérfanos. ¿Qué característica del modelo relacional asegura esta propiedad?", options:["Uso de llaves foráneas para integridad referencial","Implementación de índices para acelerar búsquedas","Creación de vistas materializadas"], answer:0, area:"Aplicación"},
{q:"Un sistema de procesamiento de datos en tiempo real requiere procesar grandes volúmenes de información con baja latencia y actualizaciones continuas. ¿Qué arquitectura es más adecuada para este caso?", options:["Arquitectura de streaming de datos","Procesamiento batch tradicional","Almacenamiento en archivos planos"], answer:0, area:"Aplicación"},
{q:"Un modelo de aprendizaje automático presenta un alto error en el conjunto de prueba comparado con el de entrenamiento, indicando sobreajuste. ¿Qué acción es más efectiva para mejorar su capacidad de generalización?", options:["Aplicar regularización para penalizar la complejidad del modelo","Aumentar el número de parámetros del modelo","Reducir el tamaño del conjunto de entrenamiento"], answer:0, area:"IA"},
{q:"Una red de computadoras debe segmentar dominios de broadcast para reducir el tráfico innecesario y mejorar la seguridad. ¿Qué tecnología permite lograr este objetivo sin modificar el cableado físico?", options:["Implementar VLANs para segmentación lógica","Configurar NAT en cada dispositivo","Utilizar el protocolo ARP para filtrado"], answer:0, area:"Base"},
{q:"Un algoritmo debe encontrar el árbol generador mínimo en un grafo no dirigido y denso con miles de nodos. ¿Qué algoritmo es más eficiente para este propósito?", options:["Algoritmo de Prim utilizando colas de prioridad","Recorridos DFS para explorar componentes","Algoritmo greedy sin estructura auxiliar"], answer:0, area:"Algoritmia"},
{q:"Una aplicación web de alta demanda debe protegerse contra ataques de falsificación de solicitudes entre sitios (CSRF) sin afectar la usabilidad del usuario. ¿Qué mecanismo es el más adecuado?", options:["Implementar tokens CSRF únicos por sesión","Permitir solicitudes CORS sin restricciones","Cachear formularios para acelerar respuestas"], answer:0, area:"Aplicación"},
{q:"Un sistema de archivos distribuido requiere alta disponibilidad y consistencia de datos incluso ante fallos de nodos individuales. ¿Qué estrategia de replicación es más adecuada?", options:["Replicación con quorum para escritura y lectura","Mantener todos los datos en un solo nodo","Deshabilitar la replicación para evitar inconsistencias"], answer:0, area:"Base"},
{q:"Un modelo de clasificación enfrenta un severo desbalanceo de clases en el conjunto de entrenamiento. ¿Qué técnica puede mejorar el desempeño del modelo en este escenario?", options:["Aplicar remuestreo para balancear las clases","Reducir el tamaño del conjunto de datos","Eliminar las clases minoritarias"], answer:0, area:"IA"},
{q:"Un sistema de autenticación distribuido necesita mantener sesiones válidas en múltiples instancias de servidor sin compartir estado entre ellas. ¿Qué mecanismo es más apropiado?", options:["Emplear tokens JWT para autenticación sin estado","Almacenar sesiones en memoria local de cada instancia","Utilizar cookies sin firma"], answer:0, area:"Aplicación"},
{q:"En una red interna, se requiere cifrado de extremo a extremo entre servicios para proteger la confidencialidad de la información transmitida. ¿Qué tecnología es más adecuada?", options:["Implementar mTLS (mutual TLS) para canal seguro","Utilizar HTTP sin cifrado por simplicidad","Emplear FTP para transferencias"], answer:0, area:"Base"},
{q:"Un algoritmo debe seleccionar rápidamente los k elementos más pequeños de una lista muy grande, sin necesidad de ordenar toda la lista. ¿Qué técnica es más eficiente?", options:["Quickselect para obtener los k menores elementos","Merge sort para ordenar la lista completa","Bubble sort por simplicidad"], answer:0, area:"Algoritmia"},
{q:"Un sistema de cache distribuido requiere invalidar datos automáticamente después de cierto tiempo para evitar servir información obsoleta. ¿Qué política de expiración es más adecuada?", options:["Time-To-Live (TTL) para cada entrada en cache","Política LRU para reemplazo de caché","FIFO para eliminación de datos antiguos"], answer:0, area:"Base"},
{q:"Un modelo de procesamiento de lenguaje natural necesita explicar cómo toma decisiones para facilitar su adopción en entornos regulados. ¿Qué característica es prioritaria?", options:["Seleccionar modelos interpretables y explicables","Aumentar la profundidad de la red neuronal","Incrementar la complejidad sin restricción"], answer:0, area:"IA"},
{q:"Un sistema de archivos requiere detectar y corregir errores de transmisión de datos entre nodos. ¿Qué mecanismo es más efectivo para este fin?", options:["Utilizar códigos CRC para verificación de integridad","Implementar ARP para resolución de direcciones","Aplicar NAT para traducción de direcciones"], answer:0, area:"Base"},
{q:"Un algoritmo de búsqueda necesita recorrer todos los nodos de un grafo por niveles, asegurando que los nodos más cercanos a la raíz se visiten primero. ¿Qué método es más adecuado?", options:["Búsqueda en anchura (BFS)","Búsqueda en profundidad (DFS)","Heap para priorizar nodos"], answer:0, area:"Algoritmia"},
{q:"Un sistema financiero requiere auditar todos los cambios realizados en registros críticos, permitiendo reconstruir el historial completo de modificaciones. ¿Qué componente es esencial para cumplir este requerimiento?", options:["Implementar logs transaccionales detallados","Utilizar cache en memoria para acelerar accesos","Aplicar recorridos DFS en los registros"], answer:0, area:"Aplicación"},
{q:"Una red empresarial necesita ocultar las direcciones IP internas de sus dispositivos al comunicarse con Internet, permitiendo que múltiples equipos compartan una sola IP pública. ¿Qué mecanismo proporciona esta funcionalidad?", options:["Traducción de direcciones de red (NAT)","Configuración de servidores DNS adicionales","ARP para resolución de direcciones"], answer:0, area:"Base"},

{q:"Un sistema distribuido requiere consenso entre múltiples nodos para mantener una copia consistente del estado global, incluso ante fallos parciales. ¿Qué protocolo es más adecuado para lograr este objetivo?", options:["Protocolo Raft para consenso distribuido","Utilizar HTTP para sincronización básica","Aplicar ARP para resolución de nodos"], answer:0, area:"Base"},

{q:"Un algoritmo requiere encontrar el elemento mediano sin ordenar completamente la lista. ¿Qué técnica es más eficiente?", options:["Quickselect","Merge sort","Insertion sort"], answer:0, area:"Algoritmia"},

{q:"Un modelo de aprendizaje requiere separar clases linealmente separables maximizando margen. ¿Qué algoritmo es adecuado?", options:["SVM","K-means","Naive Bayes"], answer:0, area:"IA"},

{q:"Un compilador necesita transformar código fuente en representación intermedia optimizable. ¿Qué fase realiza esto?", options:["Análisis semántico y generación IR","Análisis léxico","Ejecución directa"], answer:0, area:"Base"},

const SESSION_SIZE = 40;
let sessionQuestions = [];
let timeLeft = 60 * 60; // 60 minutos
let timerInterval;

function shuffle(array){
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}


function pickSession(){
let areas = {"Algoritmia":[],"Base":[],"Aplicación":[],"IA":[], "Otro":[]};
questions.forEach(q=>areas[q.area]?.push(q) ?? areas["Otro"].push(q));

let perArea = Math.floor(SESSION_SIZE / 4);
sessionQuestions = [];

Object.keys(areas).forEach(a=>{
sessionQuestions = sessionQuestions.concat(shuffle(areas[a]).slice(0, perArea));
});

sessionQuestions = shuffle(sessionQuestions);
}

function startTimer(){
timerInterval = setInterval(()=>{
timeLeft--;
let min = Math.floor(timeLeft/60);
let sec = timeLeft%60;
document.getElementById("timer").innerText = `Tiempo: ${min}:${sec.toString().padStart(2,'0')}`;
if(timeLeft<=0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

let currentIndex = 0;
let answers = {};

function loadQuiz(){
pickSession();
startTimer();
renderQuestion();
}

function renderQuestion(){
let quizDiv = document.getElementById("quiz");
let navDiv = document.getElementById("nav");
quizDiv.innerHTML = "";
navDiv.innerHTML = "";

let item = sessionQuestions[currentIndex];

let div = document.createElement("div");
div.classList.add("card");
div.innerHTML = `<p>${currentIndex+1}. ${item.q}</p>` +
item.options.map((opt,j)=>
`<label><input type="radio" name="q" value="${j}" ${answers[currentIndex]==j?"checked":""}> ${opt}</label><br>`
).join("");
quizDiv.appendChild(div);

let prev = document.createElement("button");
prev.innerText = "Anterior";
prev.onclick = ()=>{
saveAnswer();
if(currentIndex>0){currentIndex--; renderQuestion();}
};

let next = document.createElement("button");

if(currentIndex < sessionQuestions.length - 1){
    next.innerText = "Siguiente";
    next.onclick = ()=>{
        saveAnswer();
        if(currentIndex<sessionQuestions.length-1){currentIndex++; renderQuestion();}
    };
} else {
    next.innerText = "Evaluar";
    next.onclick = ()=>{
        saveAnswer();
        submitQuiz();
    };
}

navDiv.appendChild(prev);
navDiv.appendChild(next);
}

function saveAnswer(){
let selected = document.querySelector(`input[name="q"]:checked`);
if(selected) answers[currentIndex] = parseInt(selected.value);
}

function submitQuiz(){
clearInterval(timerInterval);
let score=0;
let areaStats = {};

sessionQuestions.forEach((item,i)=>{
if(!areaStats[item.area]) areaStats[item.area] = {correct:0, total:0};
areaStats[item.area].total++;

let selected = answers[i];
if(selected!==undefined && selected===item.answer){
score++;
areaStats[item.area].correct++;
}
});

let result = document.getElementById("result");
let breakdown = Object.keys(areaStats).map(a=>{
let s = areaStats[a];
return `${a}: ${s.correct}/${s.total}`;
}).join(" | ");

let html = `<p><strong>Resultado:</strong> ${score}/${sessionQuestions.length}</p>`;
html += `<p>${breakdown}</p>`;
html += `<table border="1" cellpadding="5" cellspacing="0" style="border-collapse:collapse; width:100%;">`;
html += `<tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th></tr>`;

sessionQuestions.forEach((item,i)=>{
let userAns = answers[i] !== undefined ? item.options[answers[i]] : "Sin respuesta";
let correctAns = item.options[item.answer];
let isCorrect = answers[i] === item.answer;

html += `<tr style="background:${isCorrect ? '#c8f7c5' : '#f7c5c5'}">`;
html += `<td>${i+1}</td>`;
html += `<td>${item.q}</td>`;
html += `<td>${userAns}</td>`;
html += `<td>${correctAns}</td>`;
html += `</tr>`;
});

html += `</table>`;

result.innerHTML = html;
}

loadQuiz();
</script>
